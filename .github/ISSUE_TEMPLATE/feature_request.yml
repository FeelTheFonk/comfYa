name: Feature Request
description: Suggest a new feature for comfYa
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Clear description of the feature
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why would this be useful?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other solutions you've considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Installation
        - Configuration
        - Performance
        - Compatibility
        - Documentation
        - Other
