name: Bug Report
description: Report a bug or issue with comfYa installer
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Windows version
      placeholder: "Windows 11 23H2"
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU
      description: NVIDIA GPU model
      placeholder: "RTX 4090"
    validations:
      required: true

  - type: input
    id: driver
    attributes:
      label: Driver Version
      description: NVIDIA driver version (nvidia-smi)
      placeholder: "570.86"
    validations:
      required: true

  - type: dropdown
    id: script
    attributes:
      label: Which command?
      options:
        - comfya.ps1 setup
        - comfya.ps1 run / run.bat
        - comfya.ps1 update
        - comfya.ps1 doctor
        - comfya.ps1 clean
        - validate.py
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run .\comfya.ps1 setup
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste relevant error messages
      render: shell

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
