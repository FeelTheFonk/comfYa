# comfYa - Stale Issues/PRs Cleanup

name: Stale

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issues
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed in 30 days if no further activity occurs.'
          stale-issue-label: 'stale'
          days-before-issue-stale: 30
          days-before-issue-close: 60
          exempt-issue-labels: 'pinned,security,bug'
          
          # Pull Requests
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had recent activity. It will be closed in 14 days if no further activity occurs.'
          stale-pr-label: 'stale'
          days-before-pr-stale: 14
          days-before-pr-close: 28
          exempt-pr-labels: 'pinned,work-in-progress'
