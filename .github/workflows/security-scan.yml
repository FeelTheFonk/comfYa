# comfYa - Security Scan Workflow

name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e3d5f470505cfde37a6d610da14c49845344384 # v3.28.10
        with:
          languages: python
          queries: security-and-quality
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@9e3d5f470505cfde37a6d610da14c49845344384 # v3.28.10
      
      - name: Perform Analysis
        uses: github/codeql-action/analyze@9e3d5f470505cfde37a6d610da14c49845344384 # v3.28.10
        with:
          category: "/language:python"

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      
      - name: TruffleHog Scan
        # Note: Pinned to stable version tag (SHA recommended for max security)
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          extra_args: --only-verified
