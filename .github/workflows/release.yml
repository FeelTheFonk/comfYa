# comfYa - Release Workflow
# Triggered on version tags

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # Run validation checks before release
  pre-release-check:
    name: Pre-Release Validation
    uses: ./.github/workflows/ci.yml
  
  release:
    name: Create Release
    needs: [pre-release-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log $PREV_TAG..HEAD --oneline --no-merges)
          else
            COMMITS=$(git log --oneline --no-merges -20)
          fi
          
          echo "## Changes" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "$COMMITS" | while read line; do
            echo "- $line" >> RELEASE_NOTES.md
          done
      
      - name: Create archive
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist
          
          # Create ZIP
          zip -r dist/comfYa-${VERSION}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".venv/*" \
            -x "ComfyUI/*" \
            -x "__pycache__/*" \
            -x "*.log" \
            -x ".gitignore" \
            -x ".agent/*" \
            -x "tests/*" \
            -x "testResults.xml" \
            -x ".triton_cache/*" \
            -x "CONTRIBUTING.md" \
            -x "ARCHITECTURE.md" \
            -x "docs/README.md"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: comfYa ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/comfYa-*.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
